<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomMatch — QR Code</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 380px;
    width: 90%;
  }
  h1 { color: #FF6B6B; font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
  .subtitle { color: #777; font-size: 0.9rem; margin-bottom: 28px; }
  .qr-wrap {
    background: #fff;
    border: 3px solid #FF6B6B;
    border-radius: 16px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 24px;
  }
  .qr-wrap img { display: block; width: 240px; height: 240px; }
  .url {
    font-size: 0.78rem;
    color: #999;
    word-break: break-all;
    margin-bottom: 20px;
  }
  .btn {
    display: inline-block;
    background: #FF6B6B;
    color: #fff;
    padding: 12px 28px;
    border-radius: 12px;
    font-weight: 700;
    text-decoration: none;
    font-size: 0.95rem;
    transition: background 0.2s;
  }
  .btn:hover { background: #e85555; }
  .hint { margin-top: 16px; font-size: 0.78rem; color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <h1>RoomMatch</h1>
  <p class="subtitle">Zeskanuj i znajdź współlokatora</p>
  <div class="qr-wrap">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https://web-production-dfba2.up.railway.app/&bgcolor=ffffff&color=000000&margin=4"
      alt="QR Code RoomMatch"
    >
  </div>
  <p class="url">https://web-production-dfba2.up.railway.app/</p>
  <a href="https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=https://web-production-dfba2.up.railway.app/&bgcolor=ffffff&color=000000&margin=10" download="roommatch-qr.png" class="btn">
    ⬇ Pobierz PNG
  </a>
  <p class="hint">Kliknij przycisk aby pobrać QR w wysokiej rozdzielczości (600×600)</p>
</div>
</body>
</html>
